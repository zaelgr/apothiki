<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Online Inventory</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 2px solid #ccc; background: white; }
        .logo img { height: 60px; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        aside { width: 250px; border-right: 1px solid #ddd; padding: 15px; background: #f9f9f9; overflow-y: auto; }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #eee; padding: 10px; border: 1px solid #ddd; text-align: left; }
        td { padding: 10px; border: 1px solid #ddd; }
        .tree-item { cursor: pointer; padding: 5px; color: blue; text-decoration: underline; }
        .tree-item:hover { color: darkblue; }
    </style>
</head>
<body>
<header>
    <div class="logo"><strong>MY LOGO</strong></div>
    <div class="info"><strong>Η ΕΠΙΧΕΙΡΗΣΗ ΜΟΥ</strong></div>
</header>
<div class="wrapper">
    <aside id="tree">
        <h3>📁 Κατηγορίες</h3>
        <div class="tree-item" onclick="renderTable(rawData)">👉 ΟΛΑ ΤΑ ΥΛΙΚΑ</div>
        <hr>
        <div id="categoryList"></div>
    </aside>
    <main>
        <table id="inventoryTable">
            <thead><tr id="hRow"><th>Εξάρτημα</th><th>Ποσότητα</th><th>Τιμή (€)</th></tr></thead>
            <tbody id="bRow"></tbody>
        </table>
    </main>
</div>
<script>
    let rawData = [];
    async function loadData() {
        const response = await fetch('apothiki_site.csv?t=' + new Date().getTime());
        const text = await response.text();
        const rows = text.split('\n').slice(1);
        rawData = rows.map(row => {
            const cols = row.split(',');
            return { name: cols[0], qty: cols[1], price: cols[2], cat: cols[3] || 'Γενικά' };
        }).filter(r => r.name);
        
        // Φτιάξε το Tree
        const categories = [...new Set(rawData.map(item => item.cat))];
        const catDiv = document.getElementById('categoryList');
        categories.forEach(c => {
            const div = document.createElement('div');
            div.className = 'tree-item';
            div.innerText = "📁 " + c;
            div.onclick = () => filterTable(c);
            catDiv.appendChild(div);
        });
        renderTable(rawData);
    }
    function renderTable(data) {
        const b = document.getElementById('bRow');
        b.innerHTML = data.map(r => `<tr><td>${r.name}</td><td>${r.qty}</td><td>${r.price} €</td></tr>`).join('');
    }
    function filterTable(cat) {
        const filtered = rawData.filter(item => item.cat === cat);
        renderTable(filtered);
    }
    loadData();
</script>
</body>
</html>
